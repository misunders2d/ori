services:
  ori-agent:
    build: .
    container_name: ori-agent-daemon
    init: true
    stdin_open: true
    tty: true
    volumes:
      - ./data:/code/data
      - ./.git:/code/.git
    environment:
      - DOTENV_PATH=/code/data/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
